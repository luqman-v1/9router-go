name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Build
        run: go build -ldflags="-s -w" -o /tmp/9router-go ./cmd/9router-proxy/
